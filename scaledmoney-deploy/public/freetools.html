// ─── Calculation Helpers ─────────────────────────────────────────────────────
function calcYears(currentSavings, monthlySavings, returnRate, target) {
  if (currentSavings >= target) return 0;
  if (monthlySavings <= 0) return 999;
  const r = returnRate / 100 / 12;
  let bal = currentSavings, n = 0;
  while (bal < target && n < 600) { bal = bal * (1 + r) + monthlySavings; n++; }
  return n / 12;
}
function calcCoastNum(target, rate, years) { return target / Math.pow(1 + rate / 100, years); }
function fireYear(y) { if (y >= 99) return "∞"; if (y === 0) return new Date().getFullYear().toString(); const d = new Date(); d.setFullYear(d.getFullYear() + Math.round(y)); return d.getFullYear().toString(); }
function fv(monthly, rate, years) { const r = rate / 100 / 12, n = years * 12; return monthly * ((Math.pow(1 + r, n) - 1) / r); }

// ─── Compare Panel ────────────────────────────────────────────────────────────
function ComparePanel({ compareIds, models, fireTarget, currentSavings, monthlySavings }) {
  const selected = models.filter(m => compareIds.includes(m.id));
  if (selected.length < 2) return (
    <div style={{ background: "rgba(13,26,46,0.4)", border: "1px dashed rgba(255,255,255,0.08)", borderRadius: "16px", padding: "40px", textAlign: "center" }}>
      <div style={{ fontSize: "36px", marginBottom: "14px" }}>⚖️</div>
      <div style={{ fontSize: "14px", color: "#475569", marginBottom: "6px" }}>Select 2 or more models to compare</div>
      <div style={{ fontSize: "12px", color: "#334155" }}>Use the ⚖️ button on each model card to add it to the comparison</div>
    </div>
  );

  const fastest = selected.reduce((a, b) => calcYears(currentSavings, monthlySavings, a.return, fireTarget) <= calcYears(currentSavings, monthlySavings, b.return, fireTarget) ? a : b);

  const getPortfolio = (m) => {
    const y = calcYears(currentSavings, monthlySavings, m.return, fireTarget);
    if (y >= 99) return null;
    const months = Math.round(y * 12), r = m.return / 100 / 12;
    let bal = currentSavings;
    for (let i = 0; i < months; i++) bal = bal * (1 + r) + monthlySavings;
    return bal;
  };

  const rows = [
    { label: "Expected Annual Return", sublabel: null, key: m => `${m.return}%`, best: m => m.return === Math.max(...selected.map(x => x.return)) },
    { label: "Sharpe Ratio", sublabel: "Return per unit of risk", key: m => m.sharpe.toFixed(2), best: m => m.sharpe === Math.max(...selected.map(x => x.sharpe)) },
    { label: "Max Drawdown", sublabel: "Worst historical crash", key: m => `-${m.maxDrawdown}%`, best: m => m.maxDrawdown === Math.min(...selected.map(x => x.maxDrawdown)) },
    { label: "Volatility", sublabel: null, key: m => "●".repeat(m.volatility) + "○".repeat(5 - m.volatility), best: m => m.volatility === Math.min(...selected.map(x => x.volatility)) },
    { label: "Years to FIRE", sublabel: null, key: m => { const y = calcYears(currentSavings, monthlySavings, m.return, fireTarget); return y >= 99 ? "∞" : y === 0 ? "Now 🎉" : fmtN(y); }, best: m => m.id === fastest.id },
    { label: "FIRE Target Year", sublabel: null, key: m => fireYear(calcYears(currentSavings, monthlySavings, m.return, fireTarget)), best: m => m.id === fastest.id },
    { label: "Portfolio at FIRE", sublabel: null, key: m => { const p = getPortfolio(m); return p ? fmt(p) : "—"; }, best: () => false },
    { label: "Crash Scenario", sublabel: "Portfolio after max drawdown", key: m => { const p = getPortfolio(m); return p ? fmt(p * (1 - m.maxDrawdown / 100)) : "—"; }, best: m => m.maxDrawdown === Math.min(...selected.map(x => x.maxDrawdown)) },
    { label: "Philosophy", sublabel: null, key: m => m.notes, best: () => false, italic: true },
  ];

  const cols = selected.length;
  return (
    <div style={{ background: "rgba(13,26,46,0.6)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: "20px", overflow: "hidden", overflowX: "auto" }}>
      <div style={{ display: "grid", gridTemplateColumns: `180px repeat(${cols}, 1fr)`, minWidth: `${180 + cols * 160}px`, borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
        <div style={{ padding: "16px 18px", background: "rgba(0,0,0,0.2)" }} />
        {selected.map(m => (
          <div key={m.id} style={{ padding: "16px 14px", background: "rgba(0,0,0,0.2)", borderLeft: "1px solid rgba(255,255,255,0.04)" }}>
            <div style={{ fontSize: "13px", fontWeight: 700, color: m.color }}>{m.name}</div>
            <div style={{ fontSize: "11px", color: "#64748b", marginTop: "2px" }}>{m.investor}</div>
            <AllocationBar allocation={m.allocation} height={4} />
          </div>
        ))}
      </div>
      {rows.map((row, ri) => (
        <div key={ri} style={{ display: "grid", gridTemplateColumns: `180px repeat(${cols}, 1fr)`, minWidth: `${180 + cols * 160}px`, borderBottom: "1px solid rgba(255,255,255,0.03)" }}>
          <div style={{ padding: "12px 18px", background: "rgba(0,0,0,0.1)" }}>
            <div style={{ fontSize: "12px", color: "#64748b", fontWeight: 600 }}>{row.label}</div>
            {row.sublabel && <div style={{ fontSize: "10px", color: "#334155", marginTop: "2px" }}>{row.sublabel}</div>}
          </div>
          {selected.map(m => {
            const winner = row.best(m);
            return (
              <div key={m.id} style={{ padding: "12px 14px", borderLeft: "1px solid rgba(255,255,255,0.03)", background: winner ? `${m.color}0a` : "transparent" }}>
                <div style={{ fontFamily: row.italic ? "inherit" : "'DM Mono', monospace", fontSize: row.italic ? "11px" : "13px", fontWeight: winner ? 700 : 400, color: winner ? m.color : "#94a3b8", fontStyle: row.italic ? "italic" : "normal", lineHeight: 1.5 }}>{row.key(m)}</div>
                {winner && !row.italic && <div style={{ fontSize: "9px", color: m.color, textTransform: "uppercase", letterSpacing: "0.1em", marginTop: "2px", fontWeight: 700 }}>Best</div>}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function ClassicCalc({ color, inv, annualExpenses, setAnnualExpenses, currentSavings, setCurrentSavings, monthlySavings, setMonthlySavings }) {

function DieWithZeroCalc({ color, inv, annualExpenses, setAnnualExpenses, currentSavings, setCurrentSavings }) {
  const [curAge, setCurAge] = useState(35);

  const yrsLeft = deathAge - curAge;
  const totalNeeded = DECADES.reduce((s, d, i) => s + annualExpenses * d.m * Math.min(10, Math.max(0, deathAge - (30 + i * 10))), 0);
  const projected = currentSavings * Math.pow(1 + inv.return / 100, yrsLeft);

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "24px" }}>

          <div style={{ fontSize: "11px", color: "#475569", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "8px" }}>Spending by Decade</div>
          {DECADES.map(d => (
            <div key={d.r} style={{ display: "flex", justifyContent: "space-between", marginBottom: "5px" }}>
              <div><span style={{ fontSize: "11px", color: "#94a3b8", fontWeight: 600 }}>{d.r}</span><span style={{ fontSize: "10px", color: "#475569", marginLeft: "6px" }}>{d.label}</span></div>
              <span style={{ fontFamily: "'DM Mono', monospace", fontSize: "11px", color }}>{fmt(annualExpenses * d.m)}/yr</span>
            </div>
          ))}

      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
        <div style={{ background: `${color}0d`, border: `1px solid ${color}30`, borderRadius: "14px", padding: "18px", textAlign: "center", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: color }} />
          <div style={{ fontSize: "10px", color: "#475569", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "4px" }}>Total Life Spending Target</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: "32px", fontWeight: 700, color, lineHeight: 1 }}>{fmt(totalNeeded)}</div>
          <div style={{ fontSize: "11px", color: "#475569", marginTop: "4px" }}>Optimized across {yrsLeft} years</div>
        </div>
        <StatCard label="Projected Lifetime Wealth" value={fmt(projected)} sub={`Savings compounded ${yrsLeft} years`} color="#e2e8f0" />
        <StatCard label={surplus >= 0 ? "Surplus — Spend More!" : "Funding Gap"} value={fmt(Math.abs(surplus))} sub={surplus >= 0 ? "You're leaving this unlived" : "Need to save more"} color={surplus >= 0 ? "#4ade80" : "#f87171"} accent accentColor={surplus >= 0 ? "#4ade80" : "#f87171"} />

// ─── Share Card Generator ────────────────────────────────────────────────────
function generateShareCard({ fireModel, invModel, fireNumber, yearsToFire, currentSavings, monthlySavings, velocityScore, progressPct }) {
  const W = 800, H = 440;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  const fc = fireModel.color;
  const ic = invModel.color;

  // ── Background
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, "#080f1a");
  bg.addColorStop(1, "#0d1a2e");
  ctx.fillStyle = bg;
  ctx.roundRect(0, 0, W, H, 20);
  ctx.fill();

  // ── Subtle grid overlay
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // ── Glow
  const glow = ctx.createRadialGradient(W * 0.25, H * 0.3, 0, W * 0.25, H * 0.3, 280);
  glow.addColorStop(0, fc + "18");
  glow.addColorStop(1, "transparent");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // ── Top accent bar
  const bar = ctx.createLinearGradient(0, 0, W, 0);
  bar.addColorStop(0, fc);
  bar.addColorStop(0.5, ic);
  bar.addColorStop(1, fc);
  ctx.fillStyle = bar;
  ctx.roundRect(0, 0, W, 4, [4, 4, 0, 0]);
  ctx.fill();

  // ── Border
  ctx.strokeStyle = fc + "35";
  ctx.lineWidth = 1.5;
  ctx.roundRect(1, 1, W - 2, H - 2, 20);
  ctx.stroke();

  // ── Brand pill top-left
  ctx.fillStyle = "rgba(241,192,64,0.1)";
  ctx.roundRect(28, 24, 220, 26, 13);
  ctx.fill();
  ctx.strokeStyle = "rgba(241,192,64,0.25)";
  ctx.lineWidth = 1;
  ctx.roundRect(28, 24, 220, 26, 13);
  ctx.stroke();
  ctx.fillStyle = "#f1c040";
  ctx.font = "600 10px sans-serif";
  ctx.letterSpacing = "0.1em";
  ctx.fillText("SCALEDMONEY|OS™  ·  THE LEAN DOLLAR", 42, 41);

  // ── FIRE type badge top-right
  ctx.fillStyle = fc + "18";
  ctx.roundRect(W - 180, 20, 155, 34, 10);
  ctx.fill();
  ctx.strokeStyle = fc + "35";
  ctx.lineWidth = 1;
  ctx.roundRect(W - 180, 20, 155, 34, 10);
  ctx.stroke();
  ctx.fillStyle = fc;
  ctx.font = "700 12px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(fireModel.emoji + "  " + fireModel.name.toUpperCase(), W - 103, 42);
  ctx.textAlign = "left";

  // ── FIRE Number — hero
  ctx.fillStyle = "#94a3b8";
  ctx.font = "600 12px sans-serif";
  ctx.letterSpacing = "0.12em";
  ctx.fillText("MY FIRE NUMBER", 28, 96);

  const fireStr = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(fireNumber);
  ctx.font = "800 62px sans-serif";
  const grad = ctx.createLinearGradient(28, 100, 400, 160);
  grad.addColorStop(0, "#f8f4e8");
  grad.addColorStop(1, fc);
  ctx.fillStyle = grad;
  ctx.fillText(fireStr, 28, 162);

  // ── Tagline
  ctx.fillStyle = "#475569";
  ctx.font = "400 14px sans-serif";
  ctx.letterSpacing = "0";
  ctx.fillText(fireModel.tagline, 28, 188);

  // ── Progress bar
  const barY = 212, barH = 10, barW = W - 56;
  ctx.fillStyle = "#0f172a";
  ctx.roundRect(28, barY, barW, barH, 5);
  ctx.fill();
  const progGrad = ctx.createLinearGradient(28, 0, 28 + barW, 0);
  progGrad.addColorStop(0, fc);
  progGrad.addColorStop(1, ic);
  ctx.fillStyle = progGrad;
  ctx.roundRect(28, barY, Math.max(12, barW * (progressPct / 100)), barH, 5);
  ctx.fill();

  ctx.fillStyle = fc;
  ctx.font = "700 11px sans-serif";
  ctx.textAlign = "right";
  ctx.fillText(`${progressPct}% TO FIRE`, W - 28, barY + 9);
  ctx.textAlign = "left";

  // ── Stat cards row
  const stats = [
    { label: "YEARS TO FIRE", value: yearsToFire >= 99 ? "∞" : yearsToFire === 0 ? "NOW 🎉" : fmtN(yearsToFire), color: fc },
    { label: "TARGET YEAR", value: fireYear(yearsToFire), color: "#e2e8f0" },
    { label: "SPRINT VELOCITY", value: `${velocityScore}%`, color: "#e2e8f0" },
    { label: "INVESTMENT MODEL", value: invModel.investor.split(" ").slice(-1)[0].toUpperCase(), color: ic },
  ];

  const cardW = (W - 56 - 30) / 4, cardY = 240, cardH = 80;
  stats.forEach((s, i) => {
    const x = 28 + i * (cardW + 10);
    ctx.fillStyle = i === 0 ? fc + "12" : "rgba(15,23,42,0.6)";
    ctx.roundRect(x, cardY, cardW, cardH, 10);
    ctx.fill();
    ctx.strokeStyle = i === 0 ? fc + "35" : "rgba(255,255,255,0.05)";
    ctx.lineWidth = 1;
    ctx.roundRect(x, cardY, cardW, cardH, 10);
    ctx.stroke();
    ctx.fillStyle = "#475569";
    ctx.font = "600 9px sans-serif";
    ctx.letterSpacing = "0.08em";
    ctx.fillText(s.label, x + 12, cardY + 20);
    ctx.fillStyle = s.color;
    ctx.font = "700 20px sans-serif";
    ctx.letterSpacing = "0";
    ctx.fillText(s.value, x + 12, cardY + 52);
  });

  // ── Investment model strip
  const stripY = 340;
  ctx.fillStyle = ic + "10";
  ctx.roundRect(28, stripY, W - 56, 52, 10);
  ctx.fill();
  ctx.strokeStyle = ic + "25";
  ctx.lineWidth = 1;
  ctx.roundRect(28, stripY, W - 56, 52, 10);
  ctx.stroke();

  ctx.fillStyle = "#475569";
  ctx.font = "600 10px sans-serif";
  ctx.letterSpacing = "0.08em";
  ctx.fillText("INVESTMENT PHILOSOPHY", 44, stripY + 18);

  ctx.fillStyle = ic;
  ctx.font = "700 15px sans-serif";
  ctx.letterSpacing = "0";
  ctx.fillText(invModel.name + "  ·  " + invModel.investor, 44, stripY + 38);

  // allocation bar inside strip
  let ax = W - 200;
  invModel.allocation.forEach(a => {
    const aw = (a.pct / 100) * 160;
    ctx.fillStyle = a.color;
    ctx.roundRect(ax, stripY + 20, aw, 14, 2);
    ctx.fill();
    ax += aw;
  });

  // ── Footer
  const footY = H - 28;
  ctx.fillStyle = "#1e293b";
  ctx.roundRect(28, footY - 2, W - 56, 1, 1);
  ctx.fill();

  ctx.fillStyle = "#334155";
  ctx.font = "400 11px sans-serif";
  ctx.letterSpacing = "0";
  ctx.fillText("scaledmoney.com/freetools  ·  What's your number?", 28, footY + 16);
  ctx.textAlign = "right";
  ctx.fillStyle = "#475569";
  ctx.fillText("ScaledMoney|OS™  ·  For educational purposes only", W - 28, footY + 16);
  ctx.textAlign = "left";

  return canvas.toDataURL("image/png");
}

function ShareCardModal({ isOpen, onClose, fireModel, invModel, fireNumber, yearsToFire, velocityScore, progressPct, currentSavings, monthlySavings }) {
  const [imgSrc, setImgSrc] = useState(null);
  const [copied, setCopied] = useState(false);

  useState(() => {
    if (isOpen) {
      setTimeout(() => {
        try {
          const src = generateShareCard({ fireModel, invModel, fireNumber, yearsToFire, currentSavings, monthlySavings, velocityScore, progressPct });
          setImgSrc(src);
        } catch(e) { console.error(e); }
      }, 100);
    }
  }, [isOpen]);

  if (!isOpen) return null;

  const download = () => {
    if (!imgSrc) return;
    const a = document.createElement("a");
    a.href = imgSrc;
    a.download = `my-fire-card-${fireModel.id}.png`;
    a.click();

  const tweetText = `🔥 My FIRE Number: ${new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(fireNumber)} | ${yearsToFire >= 99 ? "∞" : fmtN(yearsToFire)} years to ${fireModel.name} | ${progressPct}% there\n\nInvesting: ${invModel.name} — ${invModel.return}% return\n\nCalculate yours 👇 #FIRE #FinancialIndependence #ScaledMoneyOS`;
  const tweetUrl = `https://scaledmoney.com/freetools?utm_source=twitter&utm_medium=share_card&utm_campaign=fire_identity`;
  const twitterIntent = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}&url=${encodeURIComponent(tweetUrl)}`;

  const copyText = () => {
    navigator.clipboard.writeText(tweetText + "\n\n" + tweetUrl).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); });

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999, padding: "20px" }} onClick={onClose}>
